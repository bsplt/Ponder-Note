name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12

      - name: Run tests in Nix dev shell
        run: nix develop -c bash -lc "cd app && pnpm install --frozen-lockfile && pnpm test"
